version: '3.8'

services:
  api:
    container_name: api
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./duckchat:/app/duckchat
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/providers"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./duckchat:/app/duckchat
    depends_on:
      - api

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_models:
